<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in the Dungeon</title>
    <script src="./js/script.js" defer></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1 id="title">Lost in the Dungeon</h1>

    <div id="buttons">
        <div class="button">Start Game</div>
        <div id="levelSelectionButton" class="button">Level Selection</div>
        <div onclick="loadSettings()" id="settingsButton" class="button">Settings</div>
    </div>

    <div id="settingsOverlay">
        <div id="settings">
            <h2>Settings</h2>
            <div onclick="loadSettings()" id="x">X</div>
            <div>
                <p>Audio: 
                    <div id="audioBox" class="box">
                        <img onclick="audio()" class="x" src="./img/x.png" alt="x">
                    </div>
                </p>
            </div>

            <div>
                <p>Background Music: 
                    <div class="box" id="musicBox">
                        <img onclick="bgmusic()" class="x" src="./img/x.png" alt="x">
                    </div>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
